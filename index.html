<!doctype html>
<html lang="zh-TW" class="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>PTCG 競技分析儀表板</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
        <style>
            .tag-btn {
                transition: all 0.2s;
                cursor: pointer;
                user-select: none;
            }
            .tag-btn.selected {
                background-color: #2563eb;
                color: white;
                border-color: transparent;
            }
            ::-webkit-scrollbar {
                width: 8px;
                height: 8px;
            }
            ::-webkit-scrollbar-track {
                background: #1f2937;
            }
            ::-webkit-scrollbar-thumb {
                background: #4b5563;
                border-radius: 4px;
            }
            ::-webkit-scrollbar-thumb:hover {
                background: #6b7280;
            }
        </style>
        <script>
            tailwind.config = { darkMode: "class" };
        </script>
    </head>
    <body
        class="bg-gray-950 text-gray-100 min-h-screen p-4 md:p-8 font-sans antialiased"
    >
        <div class="max-w-7xl mx-auto">
            <header class="mb-8 flex items-center justify-between">
                <div>
                    <h1
                        class="text-3xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400"
                    >
                        PTCG 競技分析儀表板
                    </h1>
                    <p class="text-gray-400 text-sm mt-1">
                        Monte Carlo Simulation Powered by Node.js
                    </p>
                </div>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div class="lg:col-span-4 space-y-6 sticky top-8 h-fit">
                    <div
                        class="bg-gray-900 p-6 rounded-2xl shadow-xl border border-gray-800"
                    >
                        <h2 class="text-xl font-bold mb-4">
                            ⚙️ 牌組與規則配置
                        </h2>

                        <div class="mb-4">
                            <textarea
                                id="deckText"
                                rows="12"
                                class="w-full bg-gray-800 border border-gray-700 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 p-3 rounded-xl text-xs font-mono resize-none"
                                placeholder="貼上 PTCGL 牌組格式..."
                            ></textarea>
                        </div>

                        <div class="space-y-4">
                            <div>
                                <label
                                    class="block mb-2 text-xs font-medium text-gray-400 uppercase"
                                    >基礎寶可夢 (Mulligan 與先發)</label
                                >
                                <div
                                    id="tags-basic"
                                    class="flex flex-wrap gap-2 p-3 bg-gray-800/50 rounded-xl min-h-[50px] border border-gray-700/50"
                                ></div>
                            </div>
                            <div>
                                <label
                                    class="block mb-2 text-xs font-medium text-gray-400 uppercase"
                                    >先攻 T1 可用檢索 (Item)</label
                                >
                                <div
                                    id="tags-search"
                                    class="flex flex-wrap gap-2 p-3 bg-gray-800/50 rounded-xl min-h-[50px] border border-gray-700/50"
                                ></div>
                            </div>
                            <div>
                                <label
                                    class="block mb-2 text-xs font-medium text-gray-400 uppercase"
                                    >後攻 T1 可用支援者 (Supporter)</label
                                >
                                <div
                                    id="tags-supporter"
                                    class="flex flex-wrap gap-2 p-3 bg-gray-800/50 rounded-xl min-h-[50px] border border-gray-700/50"
                                ></div>
                            </div>
                            <div>
                                <label
                                    class="block mb-2 text-xs font-medium text-gray-400 uppercase"
                                    >有效能量卡</label
                                >
                                <div
                                    id="tags-energy"
                                    class="flex flex-wrap gap-2 p-3 bg-gray-800/50 rounded-xl min-h-[50px] border border-gray-700/50"
                                ></div>
                            </div>
                        </div>

                        <button
                            id="runBtn"
                            class="mt-6 w-full bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-500 hover:to-blue-600 text-white font-bold py-4 rounded-xl transition-all flex items-center justify-center relative overflow-hidden"
                        >
                            <span id="btnText">🚀 執行 10 萬次模擬</span>
                            <svg
                                id="btnSpinner"
                                class="hidden animate-spin ml-3 h-5 w-5 text-white"
                                xmlns="http://www.w3.org/2000/svg"
                                fill="none"
                                viewBox="0 0 24 24"
                            >
                                <circle
                                    class="opacity-25"
                                    cx="12"
                                    cy="12"
                                    r="10"
                                    stroke="currentColor"
                                    stroke-width="4"
                                ></circle>
                                <path
                                    class="opacity-75"
                                    fill="currentColor"
                                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
                                ></path>
                            </svg>
                        </button>

                        <div
                            class="mt-6 pt-6 border-t border-gray-800 space-y-4"
                        >
                            <div class="flex gap-2">
                                <button
                                    id="saveBtn"
                                    class="flex-1 bg-gray-700 hover:bg-gray-600 text-white text-sm font-bold py-2 px-4 rounded-lg transition-colors disabled:opacity-50"
                                >
                                    💾 儲存數據
                                </button>
                                <button
                                    id="exportBtn"
                                    class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white text-sm font-bold py-2 px-4 rounded-lg transition-colors disabled:opacity-50"
                                >
                                    📸 匯出圖檔
                                </button>
                            </div>
                            <div>
                                <select
                                    id="historySelect"
                                    class="w-full bg-gray-800 border border-gray-700 focus:border-blue-500 p-2 rounded-lg text-sm text-gray-300"
                                >
                                    <option value="">-- 讀取歷史紀錄 --</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <div
                    id="export-area"
                    class="lg:col-span-8 space-y-6 bg-gray-950 p-2 rounded-2xl"
                >
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div
                            class="bg-gray-900 p-6 rounded-2xl shadow-xl border-t-4 border-green-500"
                        >
                            <h3
                                class="text-gray-400 text-sm font-bold uppercase mb-2"
                            >
                                先攻 T1 成功展開率
                            </h3>
                            <div class="flex items-baseline">
                                <span
                                    id="firstRate"
                                    class="text-5xl font-extrabold text-white"
                                    >--</span
                                ><span
                                    class="text-2xl font-bold text-green-400 ml-1"
                                    >%</span
                                >
                            </div>
                            <div
                                class="mt-4 text-sm text-gray-400 bg-gray-800/50 py-2 px-3 rounded-lg w-fit"
                                id="firstEnergy"
                            >
                                平均場上能量: --
                            </div>
                        </div>
                        <div
                            class="bg-gray-900 p-6 rounded-2xl shadow-xl border-t-4 border-blue-500"
                        >
                            <h3
                                class="text-gray-400 text-sm font-bold uppercase mb-2"
                            >
                                後攻 T1 成功展開率
                            </h3>
                            <div class="flex items-baseline">
                                <span
                                    id="secondRate"
                                    class="text-5xl font-extrabold text-white"
                                    >--</span
                                ><span
                                    class="text-2xl font-bold text-blue-400 ml-1"
                                    >%</span
                                >
                            </div>
                            <div
                                class="mt-4 text-sm text-gray-400 bg-gray-800/50 py-2 px-3 rounded-lg w-fit"
                                id="secondEnergy"
                            >
                                平均場上能量: --
                            </div>
                        </div>
                    </div>

                    <div
                        class="bg-gray-900 p-6 rounded-2xl shadow-xl border border-gray-800"
                    >
                        <h3 class="text-xl font-bold mb-4">
                            全牌組起手機率 Top 15
                        </h3>
                        <div class="h-64">
                            <canvas id="statsChart"></canvas>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 xl:grid-cols-2 gap-6">
                        <div
                            class="bg-gray-900 p-6 rounded-2xl shadow-xl border border-gray-800 xl:col-span-2"
                        >
                            <h3 class="text-lg font-bold mb-4 text-red-400">
                                ⚔️ 先發寶可夢 (Active Spot) 機率表
                            </h3>
                            <div
                                class="overflow-x-auto rounded-lg border border-gray-700/50 max-h-200 overflow-y-auto"
                            >
                                <table
                                    class="min-w-full divide-y divide-gray-700/50 text-sm"
                                >
                                    <tbody
                                        id="basicStatsTableBody"
                                        class="divide-y divide-gray-700/50"
                                    ></tbody>
                                </table>
                            </div>
                        </div>
                        <div
                            class="bg-gray-900 p-6 rounded-2xl shadow-xl border border-gray-800"
                        >
                            <h3 class="text-lg font-bold mb-4 text-yellow-400">
                                🎁 獎賞卡 (Prizes) 期望值
                            </h3>
                            <div
                                class="overflow-x-auto rounded-lg border border-gray-700/50 max-h-200 overflow-y-auto"
                            >
                                <table
                                    class="min-w-full divide-y divide-gray-700/50 text-sm"
                                >
                                    <tbody
                                        id="prizeStatsTableBody"
                                        class="divide-y divide-gray-700/50"
                                    ></tbody>
                                </table>
                            </div>
                        </div>
                        <div
                            class="bg-gray-900 p-6 rounded-2xl shadow-xl border border-gray-800"
                        >
                            <h3 class="text-lg font-bold mb-4 text-indigo-400">
                                🃏 回合首抽 (Top Deck) 機率
                            </h3>
                            <div
                                class="overflow-x-auto rounded-lg border border-gray-700/50 max-h-200 overflow-y-auto"
                            >
                                <table
                                    class="min-w-full divide-y divide-gray-700/50 text-sm"
                                >
                                    <tbody
                                        id="topDeckStatsTableBody"
                                        class="divide-y divide-gray-700/50"
                                    ></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            const DEFAULT_DECK = `Pokémon: 18\n3 Munkidori TWM 95\n2 Mega Absol ex MEG 86\n2 Mega Kangaskhan ex MEG 104\n2 Teal Mask Ogerpon ex TWM 25\n2 Latias ex SSP 76\n2 Meowth ex M3 61\n1 Lillie's Clefairy ex JTG 56\n1 Bloodmoon Ursaluna ex TWM 141\n1 Psyduck ASC 39\n1 Fezandipiti ex ASC 142\n1 Cornerstone Mask Ogerpon ex TWM 112\n\nTrainer: 29\n3 Cyrano SSP 170\n3 Crispin SCR 133\n3 Boss's Orders MEG 114\n2 Brock's Scouting JTG 146\n2 Ciphermaniac's Codebreaking TEF 145\n1 Lillie's Determination MEG 119\n4 Ultra Ball MEG 131\n4 Energy Switch MEG 115\n2 Night Stretcher ASC 196\n1 Pokégear 3.0 SVI 186\n1 Unfair Stamp TWM 165\n3 Area Zero Underdepths SCR 131\n\nEnergy: 13\n4 Darkness Energy MEE 7\n4 Grass Energy MEE 1\n2 Psychic Energy MEE 5\n2 Mist Energy TEF 161\n1 Fighting Energy MEE 6`;
            const DEFAULT_CONFIG = {
                basic: [
                    "Munkidori",
                    "Teal Mask Ogerpon ex",
                    "Latias ex",
                    "Meowth ex",
                    "Lillie's Clefairy ex",
                    "Bloodmoon Ursaluna ex",
                    "Psyduck",
                    "Fezandipiti ex",
                    "Cornerstone Mask Ogerpon ex",
                    "Mega Absol ex",
                    "Mega Kangaskhan ex",
                ],
                search: [
                    "Ultra Ball",
                    "Cyrano",
                    "Brock's Scouting",
                    "Ciphermaniac's Codebreaking",
                ],
                supporter: [
                    "Lillie's Determination",
                    "Cyrano",
                    "Brock's Scouting",
                ],
                energy: ["Darkness Energy", "Grass Energy"],
            };

            let chartInstance = null;
            let lastSimulationData = null;
            const HISTORY_KEY = "ptcg_simulator_history";
            const deckTextarea = document.getElementById("deckText");
            let allCardNames = new Set();

            // 標籤解析與渲染
            function parseAndRenderTags(config = DEFAULT_CONFIG) {
                allCardNames.clear();
                let currentSection = "all"; // 預設狀態 (防止使用者貼上沒有標題的純卡表)
                const categories = {
                    pokemon: new Set(),
                    trainer: new Set(),
                    energy: new Set(),
                    all: new Set(),
                };

                deckTextarea.value
                    .trim()
                    .split("\n")
                    .forEach((line) => {
                        const trimmedLine = line.trim();
                        if (!trimmedLine) return;

                        // 判斷是否為 Limitless 分類標題
                        const headerMatch = trimmedLine.match(
                            /^(Pok[eé]mon|Trainer|Energy):\s*\d+/i,
                        );
                        if (headerMatch) {
                            const type = headerMatch[1].toLowerCase();
                            if (type.startsWith("pok"))
                                currentSection = "pokemon";
                            else if (type === "trainer")
                                currentSection = "trainer";
                            else if (type === "energy")
                                currentSection = "energy";
                            return;
                        }

                        // 解析卡片並分類
                        const match = trimmedLine.match(
                            /^(\d+)\s+(.+?)\s+([A-Z0-9]{2,4}\s+\d+)/,
                        );
                        if (match) {
                            const name = match[2];
                            categories[currentSection].add(name);
                            allCardNames.add(name);
                        }
                    });

                // 提取各分類陣列
                const getList = (cat) =>
                    Array.from(
                        new Set([...categories[cat], ...categories.all]),
                    ).sort();
                let pokeList = getList("pokemon");
                let trainerList = getList("trainer");
                let energyList = getList("energy");

                // 如果完全沒有標題 (全部跑到 all 裡面)，保留字串比對當作 Energy 的 Fallback
                if (categories.all.size > 0)
                    energyList = energyList.filter((n) => n.includes("Energy"));

                // 渲染標籤到指定的分類區塊，並帶入預設/已選狀態
                renderTags("tags-basic", pokeList, config.basic);
                renderTags("tags-search", trainerList, config.search);
                renderTags("tags-supporter", trainerList, config.supporter);
                renderTags("tags-energy", energyList, config.energy);
            }

            function renderTags(containerId, names, preSelected = []) {
                const container = document.getElementById(containerId);
                container.innerHTML = names.length
                    ? ""
                    : '<span class="text-gray-500 text-xs italic p-1">無符合卡片</span>';
                names.forEach((name) => {
                    const btn = document.createElement("button");
                    btn.textContent = name;
                    btn.className = `tag-btn text-xs px-3 py-1.5 rounded-full border border-gray-600 bg-gray-800 text-gray-300 hover:bg-gray-700 ${preSelected.includes(name) ? "selected" : ""}`;
                    btn.dataset.cardName = name;
                    btn.onclick = () => btn.classList.toggle("selected");
                    container.appendChild(btn);
                });
            }

            function getSelectedTags(containerId) {
                return Array.from(
                    document
                        .getElementById(containerId)
                        .querySelectorAll(".tag-btn.selected"),
                ).map((b) => b.dataset.cardName);
            }

            deckTextarea.value = DEFAULT_DECK;

            // 當牌組文字變動時重新解析標籤 (保留當前已選的項目，避免打字時標籤被清空)
            let debounceTimer;
            deckTextarea.addEventListener("input", () => {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => {
                    const currentConfig = {
                        basic: getSelectedTags("tags-basic"),
                        search: getSelectedTags("tags-search"),
                        supporter: getSelectedTags("tags-supporter"),
                        energy: getSelectedTags("tags-energy"),
                    };
                    parseAndRenderTags(currentConfig);
                }, 500);
            });

            parseAndRenderTags();

            // 渲染核心數據畫面的函數
            function renderAllData(data) {
                animateValue(
                    "firstRate",
                    (data.first.success / data.iterations) * 100,
                );
                document.getElementById("firstEnergy").textContent =
                    "平均場上能量: " + data.first.avgEnergy.toFixed(2);
                animateValue(
                    "secondRate",
                    (data.second.success / data.iterations) * 100,
                );
                document.getElementById("secondEnergy").textContent =
                    "平均場上能量: " + data.second.avgEnergy.toFixed(2);

                const sortedStats = Object.entries(data.first.stats)
                    .map(([name, count]) => ({
                        name,
                        rate: (count / data.iterations) * 100,
                    }))
                    .sort((a, b) => b.rate - a.rate)
                    .slice(0, 15);
                if (chartInstance) chartInstance.destroy();
                chartInstance = new Chart(
                    document.getElementById("statsChart").getContext("2d"),
                    {
                        type: "bar",
                        data: {
                            labels: sortedStats.map((s) => s.name),
                            datasets: [
                                {
                                    data: sortedStats.map((s) => s.rate),
                                    backgroundColor: "rgba(59, 130, 246, 0.6)",
                                    borderColor: "#3b82f6",
                                    borderWidth: 1,
                                },
                            ],
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            scales: {
                                y: {
                                    grid: { color: "rgba(107, 114, 128, 0.2)" },
                                    ticks: { color: "#9ca3af" },
                                },
                                x: { display: false },
                            },
                        },
                    },
                );

                const basicStats = Object.entries(data.first.stats)
                    .filter(([name]) =>
                        (data.usedBasicPokemon || []).some((b) =>
                            name.includes(b),
                        ),
                    )
                    .map(([name, count]) => ({
                        name,
                        rate: (count / data.iterations) * 100,
                    }))
                    .sort((a, b) => b.rate - a.rate);
                document.getElementById("basicStatsTableBody").innerHTML =
                    basicStats
                        .map(
                            (s) =>
                                `<tr><td class="px-4 py-2 text-white">${s.name}</td><td class="px-4 py-2 font-bold">${s.rate.toFixed(2)}%</td></tr>`,
                        )
                        .join("") ||
                    `<tr><td colspan="2" class="px-4 py-2 text-center text-gray-500">無數據</td></tr>`;

                const prizeStats = Object.entries(data.first.prizeStats || {})
                    .map(([name, count]) => ({
                        name,
                        avg: count / data.iterations,
                    }))
                    .sort((a, b) => b.avg - a.avg);
                document.getElementById("prizeStatsTableBody").innerHTML =
                    prizeStats
                        .map(
                            (s) =>
                                `<tr><td class="px-4 py-2 text-white">${s.name}</td><td class="px-4 py-2 font-bold text-yellow-400">${s.avg.toFixed(2)} 張</td></tr>`,
                        )
                        .join("") ||
                    `<tr><td colspan="2" class="px-4 py-2 text-center text-gray-500">後端需更新 prizeStats</td></tr>`;

                const topDeckStats = Object.entries(
                    data.first.topDeckStats || {},
                )
                    .map(([name, count]) => ({
                        name,
                        rate: (count / data.iterations) * 100,
                    }))
                    .sort((a, b) => b.rate - a.rate);
                document.getElementById("topDeckStatsTableBody").innerHTML =
                    topDeckStats
                        .map(
                            (s) =>
                                `<tr><td class="px-4 py-2 text-white">${s.name}</td><td class="px-4 py-2 font-bold text-indigo-400">${s.rate.toFixed(2)}%</td></tr>`,
                        )
                        .join("") ||
                    `<tr><td colspan="2" class="px-4 py-2 text-center text-gray-500">後端需更新 topDeckStats</td></tr>`;
            }

            document
                .getElementById("runBtn")
                .addEventListener("click", async () => {
                    const btn = document.getElementById("runBtn");
                    btn.disabled = true;
                    document
                        .getElementById("btnSpinner")
                        .classList.remove("hidden");
                    document.getElementById("btnText").textContent =
                        "運算中...";
                    try {
                        const BACKEND_URL =
                            "https://ptcg-backend-iequ.onrender.com/api/simulate";
                        const res = await fetch(BACKEND_URL, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                deckText: deckTextarea.value,
                                basicPokemon: getSelectedTags("tags-basic"),
                                searchCards: getSelectedTags("tags-search"),
                                supporters: getSelectedTags("tags-supporter"),
                                energyCards: getSelectedTags("tags-energy"),
                                iterations: 100000,
                            }),
                        });
                        const { data } = await res.json();
                        lastSimulationData = data;
                        renderAllData(data);
                    } catch (err) {
                        alert(
                            "伺服器錯誤！請確認 Node.js 後端運行中且包含最新代碼。",
                        );
                        console.error(err);
                    } finally {
                        btn.disabled = false;
                        document
                            .getElementById("btnSpinner")
                            .classList.add("hidden");
                        document.getElementById("btnText").textContent =
                            "🚀 執行 10 萬次模擬";
                    }
                });

            function animateValue(id, final) {
                const obj = document.getElementById(id);
                let start = null,
                    initVal = parseFloat(obj.innerText) || 0;
                const step = (ts) => {
                    if (!start) start = ts;
                    const prog = Math.min((ts - start) / 1000, 1);
                    obj.innerText = (
                        initVal +
                        (final - initVal) * (1 - Math.pow(1 - prog, 4))
                    ).toFixed(2);
                    if (prog < 1) window.requestAnimationFrame(step);
                };
                window.requestAnimationFrame(step);
            }

            function loadHistoryOptions() {
                const history = JSON.parse(
                    localStorage.getItem(HISTORY_KEY) || "[]",
                );
                const select = document.getElementById("historySelect");
                select.innerHTML =
                    '<option value="">-- 讀取歷史紀錄 --</option>';
                history.forEach((item, i) =>
                    select.add(
                        new Option(
                            `${item.date} - ${item.config.basic[0] || "未命名"}軸`,
                            i,
                        ),
                    ),
                );
            }
            loadHistoryOptions();

            document.getElementById("saveBtn").addEventListener("click", () => {
                if (!lastSimulationData) return alert("請先執行模擬！");
                const history = JSON.parse(
                    localStorage.getItem(HISTORY_KEY) || "[]",
                );
                history.unshift({
                    date: new Date().toLocaleString("zh-TW", { hour12: false }),
                    deckText: deckTextarea.value,
                    config: {
                        basic: getSelectedTags("tags-basic"),
                        search: getSelectedTags("tags-search"),
                        supporter: getSelectedTags("tags-supporter"),
                        energy: getSelectedTags("tags-energy"),
                    },
                    data: lastSimulationData,
                });
                if (history.length > 20) history.pop();
                localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
                alert("💾 儲存成功！");
                loadHistoryOptions();
            });

            // --- 優化版：讀取歷史紀錄時直接同步 UI 狀態 ---
            document
                .getElementById("historySelect")
                .addEventListener("change", (e) => {
                    if (e.target.value === "") return;
                    const record = JSON.parse(
                        localStorage.getItem(HISTORY_KEY) || "[]",
                    )[e.target.value];
                    deckTextarea.value = record.deckText;

                    // 直接帶入歷史設定並渲染，不用再 setTimeout 了
                    parseAndRenderTags(record.config);

                    lastSimulationData = record.data;
                    renderAllData(record.data);
                });

            document
                .getElementById("exportBtn")
                .addEventListener("click", () => {
                    const target = document.getElementById("export-area");
                    const btn = document.getElementById("exportBtn");
                    btn.textContent = "生成中...";
                    btn.disabled = true;
                    html2canvas(target, {
                        scale: 2,
                        backgroundColor: "#030712",
                    })
                        .then((canvas) => {
                            const a = document.createElement("a");
                            a.download = `PTCG_Sim_${Date.now()}.png`;
                            a.href = canvas.toDataURL("image/png");
                            a.click();
                        })
                        .catch(() => alert("截圖失敗"))
                        .finally(() => {
                            btn.textContent = "📸 匯出圖檔";
                            btn.disabled = false;
                        });
                });
        </script>
    </body>
</html>
